upstream backend   { server backend:5000; }
upstream ml_service { server ml-service:5001; }

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m    rate=30r/m;
limit_req_zone $binary_remote_addr zone=chat:10m   rate=10r/m;
limit_req_zone $binary_remote_addr zone=auth:10m   rate=5r/m;

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         DENY;
    add_header X-XSS-Protection        "1; mode=block";

    client_max_body_size 10M;

    # ── API routes ────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass         http://backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/chat/ {
        limit_req zone=chat burst=5 nodelay;
        proxy_pass         http://backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;   # longer timeout for LLM responses
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ── WebSocket upgrade ─────────────────────────
    location /socket.io/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── ML service (internal only — not exposed to internet) ─
    location /ml/ {
        internal;
        proxy_pass         http://ml_service/;
    }

    # ── ML docs (dev only — disable in prod) ─────
    location /ml-docs {
        proxy_pass         http://ml_service/docs;
    }

    # ── Health checks ─────────────────────────────
    location /health {
        proxy_pass http://backend/health;
    }

    # ── Static frontend (served by Vite dev server or CDN) ───
    location / {
        proxy_pass         http://host.docker.internal:5173;
        proxy_set_header   Host $host;
    }
}
