version: "3.9"

services:

  # ── MongoDB ──────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: agritech-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-agritech_secret}
      MONGO_INITDB_DATABASE: agritech
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agritech-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Node.js Backend ───────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agritech-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV:          production
      PORT:              5000
      MONGODB_URI:       mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-agritech_secret}@mongo:27017/agritech?authSource=admin
      REDIS_URL:         redis://redis:6379
      JWT_SECRET:        ${JWT_SECRET}
      JWT_EXPIRES_IN:    ${JWT_EXPIRES_IN:-7d}
      ML_SERVICE_URL:    http://ml-service:5001
      CLIENT_URL:        ${CLIENT_URL:-http://localhost:5173}
      WEATHER_API_KEY:   ${WEATHER_API_KEY:-}
      MSG91_API_KEY:     ${MSG91_API_KEY:-}
      MSG91_FLOW_ID:     ${MSG91_FLOW_ID:-}
      FCM_SERVER_KEY:    ${FCM_SERVER_KEY:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Python ML Service ─────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: agritech-ml
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      ENV:              production
      PORT:             5001
      OPENAI_API_KEY:   ${OPENAI_API_KEY:-}
      OPENAI_MODEL:     ${OPENAI_MODEL:-gpt-3.5-turbo}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s   # allow time for model download

  # ── Nginx reverse proxy ───────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: agritech-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro     # mount SSL certs in production
    depends_on:
      - backend
      - ml-service
    profiles:
      - production   # only starts with: docker compose --profile production up

volumes:
  mongo_data:
  redis_data:
